name: Validate and release

on:
  push:
    branches: [master, main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  release:
    if: github.event_name == 'release'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build release package
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm run build
          cd dist
          zip -r ../module.zip .
      - name: Attach Foundry package
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/module.json
            module.zip
